<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AvatarX Marketplace | Virtual Goods & Escrow</title>
  <meta name="description" content="Securely buy and sell virtual avatar goods, credits, and VIP packages.">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
  
  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Google Auth -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- Styles -->
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

  <div class="app-container">
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
      <div class="logo">
        <i data-lucide="hexagon" style="color: var(--accent-cyan); width: 32px; height: 32px;"></i>
        <span class="text-gradient">AvatarX</span>
      </div>
      
      <div class="nav-links" id="nav-links">
        <!-- Rendered dynamically based on auth state -->
      </div>
    </nav>

    <!-- Main Content Area -->
    <main class="main-content" id="app">
      <!-- SPA Content injected here -->
      <div style="display:flex; justify-content:center; align-items:center; height: 50vh;">
        <div class="spinner" style="width: 48px; height: 48px;"></div>
      </div>
    </main>
  </div>

  <!-- Global Modal Container -->
  <div class="modal-overlay" id="global-modal">
    <div class="modal-content glass-panel" id="modal-content-area">
      <!-- Injected -->
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- App Core Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  
  <!-- Page Scripts (Loaded as needed or bundled here for simplicity) -->
  <script src="/js/auth.js"></script>
  <script src="/js/marketplace.js"></script>
  <script src="/js/listing.js"></script>
  <script src="/js/wallet.js"></script>
  <script src="/js/orders.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/admin.js"></script>
  
  <script>
    // Initialize Lucide Icons
    lucide.createIcons();
  </script>
</body>
</html>
